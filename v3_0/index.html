<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>理想気体の状態方程式シミュレータ</title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:40px;
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      gap:32px;

      background:
        radial-gradient(circle at top,#243b55,#141e30);

      font-family:
        "Segoe UI",
        "Hiragino Sans",
        sans-serif;

      color:white;
    }

    .container{

      width:min(1700px,95vw);

      display:grid;

      grid-template-columns:
        420px
        1fr;

      gap:28px;

      align-items:start;
    }

    .right-side{

      display:flex;
      flex-direction:column;

      gap:20px;
    }

    .main-panel{

      background:
        rgba(255,255,255,0.08);

      border:
        1px solid rgba(255,255,255,0.15);

      border-radius:24px;

      padding:18px;

      overflow:hidden;
    }

    .graph-row{
      display:flex;

      gap:20px;

      flex-wrap:wrap;

      justify-content:center;

      width:100%;
    }

    .graph-row canvas{

      width:100%;

      max-width:420px;

      min-width:260px;

      height:auto;

      flex:1 1 260px;

      background:
        rgba(255,255,255,0.02);

      border-radius:12px;
    }

    .pvt-controls{

      margin-top:18px;

      display:grid;

      grid-template-columns:
        repeat(3,1fr);

      gap:20px;
    }

    .sub-panel{

      background:
        rgba(255,255,255,0.08);

      border:
        1px solid rgba(255,255,255,0.15);

      border-radius:24px;

      padding:18px;
    }

    .sim-area{
      flex:1;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .chamber{
      position:relative;
      z-index:0;

      width:360px;
      height:520px;

      border:
        5px solid rgba(255,255,255,0.9);

      border-top:none;

      border-radius:0 0 28px 28px;

      background:
        linear-gradient(
          to bottom,
          rgba(255,255,255,0.03),
          rgba(255,255,255,0.08)
        );

      overflow:hidden;
    }

    .chamber.constant-temp::after{
      z-index:-1;

      content:"";

      position:absolute;

      inset:-18px;

      border-radius:40px;

      pointer-events:none;

      filter:blur(24px);

      opacity:0.4;

      animation:
        thermalAura 3s ease-in-out infinite;

      background:
        radial-gradient(
          circle,
          var(--auraColor),
          transparent 70%
        );
    }

    @keyframes thermalAura{

      0%{
        transform:scale(1);
        opacity:0.55;
      }

      50%{
        transform:scale(1.03);
        opacity:0.85;
      }

      100%{
        transform:scale(1);
        opacity:0.55;
      }

    }

    .piston{
      position:absolute;

      left:-10px;

      width:380px;
      height:28px;

      background:
        linear-gradient(
          to bottom,
          #ddd,
          #888
        );

      border-radius:10px;

      box-shadow:
        0 4px 10px rgba(0,0,0,0.4);

      transition:none;
    }

    .volume-lock{
      position:absolute;

      width:100px;
      height:16px;

      background:
        linear-gradient(
          to bottom,
          #bbb,
          #666
        );

      border-radius:8px;

      left:-35px;

      display:none;

      box-shadow:
        0 0 10px rgba(0,0,0,0.4);
    }

    .gas-layer{
      position:absolute;
      inset:0;
    }

    .molecule{
      position:absolute;

      border-radius:50%;

      opacity:0.9;

      will-change:transform;
    }

    .a{
      background:#4fc3f7;
    }

    .b{
      background:#ff8a65;
    }

    .c{
      background:#81c784;
    }

    .panel{
      width:min(760px,95vw);

      background:
        rgba(255,255,255,0.08);

      border:
        1px solid rgba(255,255,255,0.15);

      backdrop-filter:blur(10px);

      border-radius:24px;

      padding:18px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.3);
    }

    .panel-grid{
      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(280px,1fr));

      gap:20px;
    }

    .panel-column{
      flex:0.8;

      min-width:260px;
    }

    h1{
      margin-top:0;
      font-size:24px;
    }

    .section{
      margin-top:16px;
    }

    .section-title{
      font-size:18px;

      margin-bottom:10px;

      opacity:0.9;
    }

    .mode-group{
      display:flex;
      flex-direction:column;

      gap:8px;
    }

    .mode-group label{
      display:flex;
      align-items:center;

      gap:10px;

      cursor:pointer;
    }

    .control{
      margin-top:12px;
    }

    .control-header{
      display:flex;
      justify-content:space-between;

      margin-bottom:6px;
    }

    input[type="range"]{
      width:100%;
    }

    .gas-card{
      margin-top:8px;

      padding:8px 10px;

      border-radius:14px;

      background:
        rgba(255,255,255,0.05);
    }

    .gas-top{
      display:flex;
      justify-content:space-between;

      margin-bottom:8px;
    }

    .partial-bar{
      width:100%;
      height:10px;

      border-radius:999px;

      overflow:hidden;

      background:
        rgba(255,255,255,0.08);

      margin-top:8px;
    }

    .partial-fill{
      height:100%;

      border-radius:999px;
    }

    .bar-a{
      background:#4fc3f7;
    }

    .bar-b{
      background:#ff8a65;
    }

    .bar-c{
      background:#81c784;
    }

    .info{
      margin-top:12px;

      padding:8px 10px;

      font-size:14px;

      line-height:1.4;
    }

    .pressure-arrows{
      position:absolute;

      left:0;

      width:100%;

      display:none;

      justify-content:space-around;

      pointer-events:none;
    }

    .arrow{
      font-size:28px;

      color:
        rgba(255,255,255,0.85);

      text-shadow:
        0 0 10px rgba(255,255,255,0.4);

      animation:
        floatArrow 1.2s ease-in-out infinite;
    }

    .arrow:nth-child(2){
      animation-delay:0.2s;
    }

    .arrow:nth-child(3){
      animation-delay:0.4s;
    }

    .arrow:nth-child(4){
      animation-delay:0.6s;
    }

    .arrow:nth-child(5){
      animation-delay:0.8s;
    }

    @keyframes floatArrow{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(8px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    .top-row{
      display:flex;

      gap:24px;

      align-items:flex-start;

      flex-wrap:wrap;

      justify-content:center;
    }

    .graph-header{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:16px;

      gap:16px;
    }

    .graph-header h2{

      margin:0;

      font-size:22px;

      font-weight:600;
    }

    #resetGraphButton{

      border:none;

      border-radius:12px;

      padding:10px 16px;

      background:
        rgba(255,255,255,0.12);

      color:white;

      cursor:pointer;

      font-size:14px;

      transition:
        background 0.2s,
        transform 0.15s;
    }

    #resetGraphButton:hover{

      background:
        rgba(255,255,255,0.2);
    }

    #resetGraphButton:active{

      transform:scale(0.96);
    }

    .panel-switch{

      display:flex;

      gap:10px;
    }

    .switch-btn{

      flex:1;

      padding:12px;

      border:none;

      border-radius:14px;

      cursor:pointer;

      color:white;

      font-size:15px;

      background:
        rgba(255,255,255,0.08);

      transition:
        0.2s;
    }

    .switch-btn:hover{

      background:
        rgba(255,255,255,0.14);
    }

    .switch-btn.active{

      background:
        rgba(255,255,255,0.22);

      box-shadow:
        0 0 12px rgba(255,255,255,0.15);
    }

    .hidden-panel{
      display:none;
    }

    @media(max-width:1200px){

      .container{

        grid-template-columns:1fr;
      }

      .pvt-controls{

        grid-template-columns:1fr;
      }

    }

    @media(max-width:900px){

      .graph-row{

        grid-template-columns:1fr;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <div class="sim-area">

      <div class="chamber">

        <div
          class="gas-layer"
          id="gasLayer"
        ></div>

        <div
          class="pressure-arrows"
          id="pressureArrows"
        >

          <div class="arrow">↓</div>
          <div class="arrow">↓</div>
          <div class="arrow">↓</div>
          <div class="arrow">↓</div>
          <div class="arrow">↓</div>

        </div>

        <div
          class="piston"
          id="piston"
        ></div>

        <div
          class="volume-lock"
          id="volumeLock"
        ></div>

      </div>

    </div>

    <div class="right-side">
      <div class="panel-switch">

        <button
          class="switch-btn active"
          id="mainTab"
        >
          グラフ・PVT
        </button>

        <button
          class="switch-btn"
          id="subTab"
        >
          詳細設定
        </button>

      </div>
      <div class="main-panel" id="mainPanel">

        <div class="graph-header">

          <h2>状態変化グラフ</h2>

          <button id="resetGraphButton">
            軌跡をリセット
          </button>

        </div>
        <div class="graph-row">
          <canvas
            id="pvGraph"
            width="420"
            height="320"
          ></canvas>

          <canvas
            id="ptGraph"
            width="420"
            height="320"
          ></canvas>
        </div>
        <div class="pvt-controls">

                <!-- 圧力 -->

          <div class="control">

            <div class="control-header">
              <span>全圧 P</span>
              <span id="pressureLabel"></span>
            </div>

            <input
              type="range"
              id="pressureSlider"
              min="1"
              max="1000"
              step="1"
            >

          </div>

          <!-- 体積 -->

          <div class="control">

            <div class="control-header">
              <span>体積 V</span>
              <span id="volumeLabel"></span>
            </div>

            <input
              type="range"
              id="volumeSlider"
              min="0.1"
              max="120"
              step="0.1"
            >

          </div>

          <!-- 温度 -->

          <div class="control">

            <div class="control-header">
              <span>絶対温度 T</span>
              <span id="tempLabel"></span>
            </div>

            <input
              type="range"
              id="tempSlider"
              min="1"
              max="500"
              step="1"
            >

          </div>

          <div class="info">

            気体分子とピストンの衝突：
            <span id="pistonCollisionLabel">
              0
            </span>
            回/s

            <br>

            （運動量：
            <span id="collisionMomentumLabel">
              0
            </span>
            /s）
        
          </div>
        </div>
      </div>
      <div class="sub-panel hidden-panel" id="subPanel">
        <h1>
          理想気体の状態方程式シミュレータ
        </h1>

        <div class="info">

          理想気体の状態方程式：

          <br>

          <b>PV = nRT</b>

        </div>

        <div class="panel-switch sub-switch">

          <button
            class="switch-btn active"
            id="basicTab"
          >
            基本設定
          </button>

          <button
            class="switch-btn"
            id="gasTab"
          >
            成分気体
          </button>

        </div>

        <div class="panel-grid">

          <div
            class="panel-column hidden-panel"
            id="gasPanel"
          >

            <div class="section">

              <div class="section-title">
                成分気体
              </div>

              <div id="gasControls"></div>

            </div>

          </div>

          <!-- 左 -->

          <div class="panel-column" id="basicPanel">

            <div class="section">

              <div class="section-title">
                条件
              </div>

              <div class="mode-group">

                <label>

                  <input
                    type="radio"
                    name="mode"
                    value="constantP"
                    checked
                  >

                  定圧条件

                </label>

                <label>

                  <input
                    type="radio"
                    name="mode"
                    value="constantV"
                  >

                  定積条件

                </label>

                <label>

                  <input
                    type="radio"
                    name="mode"
                    value="constantT"
                  >

                  定温条件

                </label>

              </div>

              <div class="control">

                <div class="control-header">
                  <span>アニメーション体積スケール</span>
                  <span id="volumeScaleLabel"></span>
                </div>

                <input
                  type="range"
                  id="volumeScaleSlider"
                  min="1"
                  max="12"
                  value="10"
                  step="0.1"
                >

              </div>

              <div class="control">

                <div class="control-header">
                  <span>アニメーション速度</span>
                  <span id="speedLabel"></span>
                </div>
              
                <input
                  type="range"
                  id="speedSlider"
                  min="0"
                  max="3"
                  step="0.1"
                  value="1"
                >
              
              </div>

            </div>

          </div>

        </div>
      </div>
    </div>

  </div>

  <script>

    let pistonHits = 0;
    let collisionMomentum = 0;

    const pvtHistory = [];

    const R = 8.314;

    const state = {

    animationSpeed: 1,
    volumeScale: 10,

      P:100,
      V:22.4,
      T:273,

      mode:"constantP",

      gases:[
        {
          name:"A（分子量20）",
          n:1,
          p:0,
        　M:20,
          color:"bar-a",
          class:"a",
          size: 7,
          visible: true
        },
        {
          name:"B（分子量40）",
          n:0,
          p:0,
          M:40,
          color:"bar-b",
          class:"b",
          size: 10,
          visible: true
        },
        {
          name:"C（分子量60）",
          n:0,
          p:0,
          M:60,
          color:"bar-c",
          class:"c",
          size: 13,
          visible: true
        }
      ],

      pistonCollisions:0,
      collisionMomentum:0

    };

    const molecules = [];

    const pressureSlider =
      document.getElementById("pressureSlider");

    const volumeSlider =
      document.getElementById("volumeSlider");

    const tempSlider =
      document.getElementById("tempSlider");

    const pressureLabel =
      document.getElementById("pressureLabel");

    const volumeLabel =
      document.getElementById("volumeLabel");

    const tempLabel =
      document.getElementById("tempLabel");

    const gasControls =
      document.getElementById("gasControls");

    const piston =
      document.getElementById("piston");

    const gasLayer =
      document.getElementById("gasLayer");

    const speedSlider =
      document.getElementById("speedSlider");

    const speedLabel =
      document.getElementById("speedLabel");

    const volumeScaleSlider =
      document.getElementById("volumeScaleSlider");

    const volumeScaleLabel =
      document.getElementById("volumeScaleLabel");

    const collisionMomentumLabel =
      document.getElementById(
        "collisionMomentumLabel"
      );

    const pistonCollisionLabel =
      document.getElementById(
        "pistonCollisionLabel"
      );

    const volumeLock =
      document.getElementById("volumeLock");

    const pressureArrows =
      document.getElementById(
        "pressureArrows"
      );

    const chamber =
      document.querySelector(".chamber");

    const graph =
      document.getElementById("pvGraph");

    const ctx =
      graph.getContext("2d");

    const ptGraph =
      document.getElementById("ptGraph");

    const ptCtx =
      ptGraph.getContext("2d");

    const GRAPH_X = 40;
    const GRAPH_Y = 20;

    const GRAPH_W = 340;
    const GRAPH_H = 240;

    const maxP = 500;
    const maxV = 120;
    const maxT = 600;

    const resetGraphButton =
      document.getElementById(
        "resetGraphButton"
      );

    resetGraphButton.addEventListener(
      "click",
      ()=>{

        pvtHistory.length = 0;

        drawPVGraph();
        drawPTGraph();

      }
    );

    function totalN(){

      return state.gases.reduce(
        (sum,g)=>sum+g.n,
        0
      );

    }

    function calcPressure(){

      return totalN()*R*state.T/state.V;

    }

    function calcVolume(){

      return totalN()*R*state.T/state.P;

    }

    function calcTemperature(){

      return state.P*state.V/(totalN()*R);

    }

    function updatePartialPressures(){

      const nTotal = totalN();

      state.gases.forEach(g=>{

        g.p = state.P * g.n / nTotal;

      });

    }

    function updateSliderState(){

      pressureSlider.disabled = true;
      volumeSlider.disabled = true;
      tempSlider.disabled = true;

      if(state.mode==="constantP"){

        tempSlider.disabled = false;

      }

      if(state.mode==="constantV"){

        tempSlider.disabled = false;

      }

      if(state.mode==="constantT"){

        pressureSlider.disabled = false;
        volumeSlider.disabled = false;

      }

    }

    function updatePiston(){

      const y =
        480 - state.V * state.volumeScale;

      piston.style.top = y + "px";

      volumeLock.style.top =
        (y + 6) + "px";

      volumeLock.style.display =
        state.mode === "constantV"
        ? "block"
        : "none";

      pressureArrows.style.top =
        (y - 45) + "px";
        
    }

    function createMolecules(){

      const pistonTop =
        480 - state.V * state.volumeScale;

      state.gases.forEach(g=>{

        const target =
          Math.floor(g.n * 100); //物質量*100（小数点以下切捨）が粒子数

        const current =
          molecules.filter(
            m=>m.gasClass===g.class
          );

        const diff =
          target - current.length;

        /* =====================
          増やす
        ===================== */

        if(diff > 0){

          for(let i=0;i<diff;i++){

            const el =
              document.createElement("div");

            el.className =
              `molecule ${g.class}`;
            el.style.width =
              g.size + "px";

            el.style.height =
              g.size + "px";

            gasLayer.appendChild(el);

            if(!g.visible){

              el.style.display = "none";

            }

            const mol = {

              el,

              gasClass:g.class,

              molecularMass: g.M,

              x:Math.random()*330,

              y:
                pistonTop +
                Math.random()*200,

              vx:0,
              vy:0,

              speedFactor:
                (0.5 + Math.random()) / Math.sqrt(g.M / 20) / 2

            };

            molecules.push(mol);

          }

        }

        /* =====================
          減らす
        ===================== */

        else if(diff < 0){

          for(let i=0;i<Math.abs(diff);i++){

            const mol =
              current[i];

            mol.el.remove();

            const index =
              molecules.indexOf(mol);

            if(index !== -1){

              molecules.splice(index,1);

            }

          }

        }

      });

      updateMoleculeSpeeds();

    }

    function updateMoleculeSpeeds(){

      const base =
        Math.sqrt(state.T) * 0.75;

      molecules.forEach(m=>{

        let angle;

        if(m.vx === 0 && m.vy === 0){

          angle =
            Math.random() * Math.PI * 2;

        }

        else{

          angle =
            Math.atan2(m.vy,m.vx);

        }

        const speed =
          base * m.speedFactor;

        m.vx =
          Math.cos(angle) * speed;

        m.vy =
          Math.sin(angle) * speed;

      });

    }

    function animate(){

      const pistonTop =
        480 - state.V * state.volumeScale;

      molecules.forEach(m=>{

        m.x += m.vx * state.animationSpeed;
        m.y += m.vy * state.animationSpeed;

        if(m.x <= 0){

          m.x = 0;
          m.vx *= -1;

        }

        if(m.x >= 348){

          m.x = 348;
          m.vx *= -1;

        }

        if(m.y >= 510){

          m.y = 510;
          m.vy *= -1;

        }

        if(m.y <= pistonTop + 28){

          m.y = pistonTop + 28;
          m.vy *= -1;
          pistonHits++;
          collisionMomentum += m.vy * m.molecularMass;

        }

        m.el.style.transform =
          `translate(${m.x}px,${m.y}px)`;

      });

      requestAnimationFrame(animate);

    }

    function renderGasControls(){

      gasControls.innerHTML = "";

      state.gases.forEach((g,index)=>{

        const div =
          document.createElement("div");

        div.className = "gas-card";
        div.dataset.index = index;

        div.innerHTML = `

          <div class="gas-top">
            <strong>気体 ${g.name}</strong>

            <span class="gas-pressure">
              p = ${g.p.toFixed(1)} kPa
            </span>
          </div>

          <div class="gas-amount">
            n = ${g.n.toFixed(2)} mol
          </div>

          <label style="
            display:flex;
            align-items:center;
            gap:8px;
              margin-top:8px;
          ">

          <input
            type="checkbox"
            class="visibility-toggle"
            checked
          >

            表示

          </label>

          <input
            type="range"
            min="0"
            max="5"
            step="0.01"
            value="${g.n}"
          >

          <div class="partial-bar">
            <div
              class="partial-fill ${g.color}"
              style="
                width:${g.p/state.P*100}%;
              "
            ></div>
          </div>

        `;

        const slider =
          div.querySelector(
          'input[type="range"]'
        );

        const toggle =
          div.querySelector(
            ".visibility-toggle"
        );

        toggle.checked = g.visible;

        toggle.addEventListener(
          "change",
          e=>{
        
            g.visible =
              e.target.checked;
        
            molecules.forEach(m=>{
        
              if(m.gasClass === g.class){
        
                m.el.style.display =
                  g.visible
                  ? "block"
                  : "none";
        
              }
        
            });
        
          }
        );

        slider.addEventListener(
          "input",
          e=>{

          const newValue =
            parseFloat(e.target.value);

          const otherTotal =
            totalN() - g.n;

          /* 全部0を禁止 */

          if(otherTotal + newValue <= 0){

            e.target.value = g.n;

            return;

          }

          g.n = newValue;

          if(state.mode==="constantV"){

            state.P =
              calcPressure();

          }

          else if(state.mode==="constantP"){

            state.V =
              calcVolume();

          }

          else if(state.mode==="constantT"){

            state.V =
              calcVolume();

          }

          updateAll();
          createMolecules();

        }
      );

        gasControls.appendChild(div);

      });

    }

    function updateGasLabels(){

      state.gases.forEach((g,index)=>{

        const card =
          document.querySelector(
            `.gas-card[data-index="${index}"]`
          );

        if(!card) return;

        card.querySelector(
          ".gas-pressure"
        ).textContent =
          `p = ${g.p.toFixed(1)} kPa`;

        card.querySelector(
          ".gas-amount"
        ).textContent =
          `n = ${g.n.toFixed(2)} mol`;

        card.querySelector(
          ".partial-fill"
        ).style.width =
          `${g.p/state.P*100}%`;

      });

    }

    function updateLabels(){

      pressureLabel.textContent =
        state.P.toFixed(1) + " kPa";

      volumeLabel.textContent =
        state.V.toFixed(2) + " L";

      tempLabel.textContent =
        `${state.T.toFixed(1)} K (${(state.T-273).toFixed(1)} ℃)`;

      speedLabel.textContent =
        state.animationSpeed.toFixed(1)
        + " ×";

      volumeScaleLabel.textContent =
        state.volumeScale + " ×";

    }

    function drawPVGraph(){

      ctx.clearRect(0,0,420,320);

      /* 背景 */

      ctx.fillStyle =
        "rgba(255,255,255,0.03)";

      ctx.fillRect(
        GRAPH_X,
        GRAPH_Y,
        GRAPH_W,
        GRAPH_H
      );

      /* 補助線 */

      ctx.strokeStyle =
        "rgba(255,255,255,0.08)";

      ctx.lineWidth = 1;

      /* 縦 */

      for(let i=0;i<=6;i++){

        const x =
          GRAPH_X + GRAPH_W*i/6;

        ctx.beginPath();

        ctx.moveTo(x,GRAPH_Y);

        ctx.lineTo(
          x,
          GRAPH_Y + GRAPH_H
        );

        ctx.stroke();

      }

      /* 横 */

      for(let i=0;i<=5;i++){

        const y =
          GRAPH_Y + GRAPH_H*i/5;

        ctx.beginPath();

        ctx.moveTo(GRAPH_X,y);

        ctx.lineTo(
          GRAPH_X + GRAPH_W,
          y
        );

        ctx.stroke();

      }

      /* 軸 */

      ctx.strokeStyle =
        "rgba(255,255,255,0.8)";

      ctx.lineWidth = 2;

      ctx.strokeRect(
        GRAPH_X,
        GRAPH_Y,
        GRAPH_W,
        GRAPH_H
      );

      /* 目盛 */

      ctx.fillStyle = "white";

      ctx.font = "12px sans-serif";

      /* V軸 */

      for(let i=0;i<=6;i++){

        const value =
          (maxV*i/6).toFixed(0);

        const x =
          GRAPH_X + GRAPH_W*i/6;

        ctx.fillText(
          value,
          x - 8,
          GRAPH_Y + GRAPH_H + 20
        );

      }

      /* P軸 */

      for(let i=0;i<=5;i++){

        const value =
          (maxP*(5-i)/5).toFixed(0);

        const y =
          GRAPH_Y + GRAPH_H*i/5;

        ctx.fillText(
          value,
          GRAPH_X - 34,
          y + 4
        );

      }

      /* 軸ラベル */

      ctx.font = "14px sans-serif";

      ctx.fillText(
        "V (L)",
        GRAPH_X + GRAPH_W/2 - 20,
        295
      );

      ctx.save();

      ctx.translate(12,160);

      ctx.rotate(-Math.PI/2);

      ctx.fillText(
        "P (kPa)",
        0,
        0
      );

      ctx.restore();

      /* 軌跡 */

      if(pvtHistory.length < 2) return;

      ctx.strokeStyle =
        "#4fc3f7";

      ctx.lineWidth = 2;

      ctx.beginPath();

      pvtHistory.forEach((p,i)=>{

        const x =
          GRAPH_X +
          (p.V/maxV)*GRAPH_W;

        const y =
          GRAPH_Y +
          GRAPH_H -
          (p.P/maxP)*GRAPH_H;

        if(i===0){

          ctx.moveTo(x,y);

        }

        else{

          ctx.lineTo(x,y);

        }

      });

      ctx.stroke();

      /* 現在点 */

      const currentX =
        GRAPH_X +
        (state.V/maxV)*GRAPH_W;

      const currentY =
        GRAPH_Y +
        GRAPH_H -
        (state.P/maxP)*GRAPH_H;

      ctx.beginPath();

      ctx.arc(
        currentX,
        currentY,
        5,
        0,
        Math.PI*2
      );

      ctx.fillStyle = "#ff8a65";

      ctx.fill();

    }

    function drawPTGraph(){

      ptCtx.clearRect(0,0,420,320);

      /* 背景 */

      ptCtx.fillStyle =
        "rgba(255,255,255,0.03)";

      ptCtx.fillRect(
        GRAPH_X,
        GRAPH_Y,
        GRAPH_W,
        GRAPH_H
      );

      /* 補助線 */

      ptCtx.strokeStyle =
        "rgba(255,255,255,0.08)";

      ptCtx.lineWidth = 1;

      /* 縦 */

      for(let i=0;i<=6;i++){

        const x =
          GRAPH_X + GRAPH_W*i/6;

        ptCtx.beginPath();

        ptCtx.moveTo(x,GRAPH_Y);

        ptCtx.lineTo(
          x,
          GRAPH_Y + GRAPH_H
        );

        ptCtx.stroke();

      }

      /* 横 */

      for(let i=0;i<=5;i++){

        const y =
          GRAPH_Y + GRAPH_H*i/5;

        ptCtx.beginPath();

        ptCtx.moveTo(GRAPH_X,y);

        ptCtx.lineTo(
          GRAPH_X + GRAPH_W,
          y
        );

        ptCtx.stroke();

      }

      /* 枠 */

      ptCtx.strokeStyle =
        "rgba(255,255,255,0.8)";

      ptCtx.lineWidth = 2;

      ptCtx.strokeRect(
        GRAPH_X,
        GRAPH_Y,
        GRAPH_W,
        GRAPH_H
      );

      /* 目盛 */

      ptCtx.fillStyle = "white";

      ptCtx.font = "12px sans-serif";

      /* T軸 */

      for(let i=0;i<=6;i++){

        const value =
          (maxT*i/6).toFixed(0);

        const x =
          GRAPH_X + GRAPH_W*i/6;

        ptCtx.fillText(
          value,
          x - 10,
          GRAPH_Y + GRAPH_H + 20
        );

      }

      /* P軸 */

      for(let i=0;i<=5;i++){

        const value =
          (maxP*(5-i)/5).toFixed(0);

        const y =
          GRAPH_Y + GRAPH_H*i/5;

        ptCtx.fillText(
          value,
          GRAPH_X - 34,
          y + 4
        );

      }

      /* 軸ラベル */

      ptCtx.font = "14px sans-serif";

      ptCtx.fillText(
        "T (K)",
        GRAPH_X + GRAPH_W/2 - 18,
        295
      );

      ptCtx.save();

      ptCtx.translate(12,160);

      ptCtx.rotate(-Math.PI/2);

      ptCtx.fillText(
        "P (kPa)",
        0,
        0
      );

      ptCtx.restore();

      /* 軌跡 */

      if(pvtHistory.length < 2) return;

      ptCtx.strokeStyle =
        "#ff8a65";

      ptCtx.lineWidth = 2;

      ptCtx.beginPath();

      pvtHistory.forEach((p,i)=>{

        const x =
          GRAPH_X +
          (p.T/maxT)*GRAPH_W;

        const y =
          GRAPH_Y +
          GRAPH_H -
          (p.P/maxP)*GRAPH_H;

        if(i===0){

          ptCtx.moveTo(x,y);

        }

        else{

          ptCtx.lineTo(x,y);

        }

      });

      ptCtx.stroke();

      /* 現在点 */

      const currentX =
        GRAPH_X +
        (state.T/maxT)*GRAPH_W;

      const currentY =
        GRAPH_Y +
        GRAPH_H -
        (state.P/maxP)*GRAPH_H;

      ptCtx.beginPath();

      ptCtx.arc(
        currentX,
        currentY,
        5,
        0,
        Math.PI*2
      );

      ptCtx.fillStyle = "#4fc3f7";

      ptCtx.fill();

    }

    function updateAll(){

      updatePartialPressures();

    pressureSlider.value =
        state.P;

      volumeSlider.value =
        state.V;

      tempSlider.value =
        state.T;

      updateLabels();

      updateGasLabels();

      updatePiston();

    pressureArrows.style.display =
      state.mode === "constantP"
      ? "flex"
      : "none";

      chamber.classList.toggle(
        "constant-temp",
        state.mode === "constantT"
      );

    const minT = 100;
    const maxT = 600;

    const ratio =
      (state.T - minT) /
      (maxT - minT);

    /*
      hue:
      青220°
        ↓
      赤0°
    */

    const hue =
      220 + ratio * 140;

    const auraColor =
      `hsla(
        ${hue},
        70%,
        65%,
        0.45
      )`;

    chamber.style.setProperty(
      "--auraColor",
      auraColor
    );

      pvtHistory.push({
        P: state.P,
        V: state.V,
        T: state.T
      });

      drawPVGraph();
      drawPTGraph();

      if(pvtHistory.length > 2000){

        pvtHistory.shift();

      }

    }

    pressureSlider.addEventListener(
      "input",
      ()=>{

        state.P =
          parseFloat(
            pressureSlider.value
          );

        if(state.mode==="constantT"){

          state.V =
            calcVolume();

          volumeSlider.value =
            state.V;
        }

        updateAll();

      }
    );

    volumeSlider.addEventListener(
      "input",
      ()=>{

        state.V =
          parseFloat(
            volumeSlider.value
          );

        if(state.mode==="constantP"){

          state.T =
            calcTemperature();

          tempSlider.value =
            state.T;

          updateMoleculeSpeeds();

        }

        else if(state.mode==="constantT"){

          state.P =
            calcPressure();

          pressureSlider.value =
            state.P;

        }

        updateAll();

      }
    );

    tempSlider.addEventListener(
      "input",
      ()=>{

        state.T =
          parseFloat(
            tempSlider.value
          );

        if(state.mode==="constantV"){

          state.P =
            calcPressure();

          pressureSlider.value =
            state.P;

        }

        else if(state.mode==="constantP"){

          state.V =
            calcVolume();

          volumeSlider.value =
            state.V;

        }

        updateMoleculeSpeeds();

        updateAll();

      }
    );

    speedSlider.addEventListener(
      "input",
      ()=>{

        state.animationSpeed =
          parseFloat(speedSlider.value);

        updateLabels();

      }
    );

    volumeScaleSlider.addEventListener(
        "input",
        ()=>{
            state.volumeScale = volumeScaleSlider.value;
            
            updateAll();
        }
    );

    document
    .querySelectorAll(
      'input[name="mode"]'
    )
    .forEach(r=>{

      r.addEventListener(
        "change",
        ()=>{

          state.mode = r.value;

          updateSliderState();

          updateAll();

        }
      );

    });

    state.P = calcPressure();

    pressureSlider.value =
      state.P;

    volumeSlider.value =
      state.V;

    tempSlider.value =
      state.T;

    speedSlider.value =
      state.animationSpeed;

    renderGasControls();

    createMolecules();

    animate();

    updateAll();

    updateSliderState();

    setInterval(()=>{

      state.collisionMomentum =
        Math.floor(collisionMomentum); //Math.max(0.1, state.animationSpeed)で割るのはやめた

      state.pistonCollisions =
        Math.floor(pistonHits);

      collisionMomentumLabel.textContent =
        Math.floor(collisionMomentum / 3);

      pistonCollisionLabel.textContent =
        Math.floor(pistonHits / 3);

      collisionMomentum = 0;
      pistonHits = 0;

    },3000);

/*==================
      UI
==================*/

    const mainTab =
      document.getElementById("mainTab");

    const subTab =
      document.getElementById("subTab");

    const mainPanel =
      document.getElementById("mainPanel");

    const subPanel =
      document.getElementById("subPanel");

    mainTab.addEventListener(
      "click",
      ()=>{

        mainPanel.classList.remove(
          "hidden-panel"
        );

        subPanel.classList.add(
          "hidden-panel"
        );

        mainTab.classList.add(
          "active"
        );

        subTab.classList.remove(
          "active"
        );

      }
    );

    subTab.addEventListener(
      "click",
      ()=>{

        subPanel.classList.remove(
          "hidden-panel"
        );

        mainPanel.classList.add(
          "hidden-panel"
        );

        subTab.classList.add(
          "active"
        );

        mainTab.classList.remove(
          "active"
        );

      }
    );

    const basicTab =
      document.getElementById("basicTab");

    const gasTab =
      document.getElementById("gasTab");

    const basicPanel =
      document.getElementById("basicPanel");

    const gasPanel =
      document.getElementById("gasPanel");

    basicTab.addEventListener(
      "click",
      ()=>{

        basicPanel.classList.remove(
          "hidden-panel"
        );

        gasPanel.classList.add(
          "hidden-panel"
        );

        basicTab.classList.add(
          "active"
        );

        gasTab.classList.remove(
          "active"
        );

      }
    );

    gasTab.addEventListener(
      "click",
      ()=>{

        gasPanel.classList.remove(
          "hidden-panel"
        );

        basicPanel.classList.add(
          "hidden-panel"
        );

        gasTab.classList.add(
          "active"
        );

        basicTab.classList.remove(
          "active"
        );

      }
    );

  </script>

</body>
